<!DOCTYPE html>
<html th:fragment="layout(title, content, extraHead, extraScripts)" lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Sistema de Inventario</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --color-primary: #6366f1;
            --color-primary-glow: rgba(99, 102, 241, 0.15);
            --color-success: #10b981;
            --color-success-glow: rgba(16, 185, 129, 0.15);
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-danger-glow: rgba(239, 68, 68, 0.15);
            --border-glow: rgba(255, 255, 255, 0.08);
            --border-active: rgba(99, 102, 241, 0.4);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(17, 24, 39, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 0.8rem 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 0.5px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-brand i {
            color: var(--color-primary);
            -webkit-text-fill-color: initial;
            background: none;
        }

        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1.1rem !important;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary) !important;
            background: var(--color-primary-glow);
        }

        /* Cards and Elements Styling */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-active);
            box-shadow: 0 15px 35px -5px rgba(99, 102, 241, 0.2);
        }

        .card-header {
            background-color: rgba(255, 255, 255, 0.02) !important;
            border-bottom: 1px solid var(--border-glow) !important;
            padding: 1.25rem 1.5rem;
            font-weight: 700;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Forms Styling */
        .form-control, .form-select {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.65rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--bg-secondary);
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px var(--color-primary-glow);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: #4b5563;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        /* Buttons Styling */
        .btn {
            border-radius: 10px;
            padding: 0.65rem 1.25rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 6px 20px 0 rgba(16, 185, 129, 0.6);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .btn-outline-warning {
            border-color: rgba(245, 158, 11, 0.4);
            color: var(--color-warning);
        }

        .btn-outline-warning:hover {
            background-color: var(--color-warning);
            color: #000;
            border-color: var(--color-warning);
        }

        .btn-outline-danger {
            border-color: rgba(239, 68, 68, 0.4);
            color: var(--color-danger);
        }

        .btn-outline-danger:hover {
            background-color: var(--color-danger);
            color: #fff;
            border-color: var(--color-danger);
        }

        /* Custom Table Styling */
        .table-responsive {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-glow);
        }

        .table {
            color: var(--text-primary) !important;
            margin-bottom: 0;
            border-collapse: separate;
        }

        .table thead th {
            background-color: var(--bg-secondary) !important;
            color: var(--text-secondary) !important;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.8px;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-glow) !important;
        }

        .table tbody tr td {
            background-color: var(--bg-card) !important;
            color: var(--text-primary) !important;
            padding: 1.1rem 1.25rem;
            border-bottom: 1px solid var(--border-glow) !important;
            vertical-align: middle;
            transition: background-color 0.2s ease;
        }

        .table-hover tbody tr:hover td {
            background-color: rgba(255, 255, 255, 0.04) !important;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in-section {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Custom styles */
        .badge {
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .badge-entrada {
            background-color: var(--color-success-glow) !important;
            color: #34d399 !important;
            border: 1px solid rgba(52, 211, 153, 0.3);
        }

        .badge-salida {
            background-color: var(--color-danger-glow) !important;
            color: #f87171 !important;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        /* Alert Styling */
        .alert {
            border-radius: 12px;
            border: 1px solid transparent;
            padding: 1rem 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background-color: var(--color-success-glow);
            border-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .alert-danger {
            background-color: var(--color-danger-glow);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .alert-info {
            background-color: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }

        .invalid-feedback {
            color: #f87171;
            font-size: 0.825rem;
            margin-top: 0.25rem;
        }

        .is-invalid {
            border-color: #ef4444 !important;
        }

        .is-invalid:focus {
            box-shadow: 0 0 0 4px var(--color-danger-glow) !important;
        }

        footer {
            margin-top: auto;
            border-top: 1px solid var(--border-glow);
            background-color: rgba(17, 24, 39, 0.4);
        }
    </style>
    <th:block th:replace="${extraHead}"></th:block>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark mb-5 shadow">
    <div class="container">
        <a class="navbar-brand" th:href="@{/inventario}">
            <i class="bi bi-boxes"></i>
            <span th:text="#{app.nombre}">Sistema de Inventario</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/inventario}"
                       th:text="#{nav.inventario}">Inventario</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/inventario/transacciones}"
                       th:text="#{nav.transacciones}">Transacciones</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/inventario/transaccion/nueva}"
                       th:text="#{nav.nuevo.movimiento}">Nuevo Movimiento</a>
                </li>
                <!-- Selector de Idioma Dinámico -->
                <li class="nav-item dropdown ms-lg-3">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" id="langDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-translate text-primary"></i>
                        <span class="d-lg-none">Idioma / Language</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary" aria-labelledby="langDropdown">
                        <li><a class="dropdown-item text-light" href="?lang=es">Español</a></li>
                        <li><a class="dropdown-item text-light" href="?lang=en">English</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<main class="container fade-in-section">
    <!-- Mensajes flash de éxito -->
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="#{${mensajeExito}}">Operación exitosa</span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    <!-- Mensajes flash de error -->
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${mensajeError}">Error</span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <!-- Slot de contenido de cada página -->
    <th:block th:replace="${content}"></th:block>
</main>

<footer class="text-center text-muted py-4 mt-5">
    <div class="container">
        <small th:text="#{app.footer}">Sistema de Inventario &copy; 2024</small>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${extraScripts}"></th:block>
</body>
</html>
