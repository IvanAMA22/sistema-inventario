# ==========================================
# PERFIL DE DESARROLLO — H2 en memoria
# ==========================================
spring.datasource.url=jdbc:h2:mem:inventariodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA / HIBERNATE con H2
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Sobreescribir explícitamente el dialecto MySQL del application.properties base
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Consola H2 (opcional: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Los datos iniciales se cargan con import.sql (ejecutado por Hibernate)

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==========================================
# INTERNACIONALIZACIÓN
# ==========================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.default-locale=es

# ==========================================
# SERVIDOR
# ==========================================
server.port=8080
spring.application.name=sistema-inventario
