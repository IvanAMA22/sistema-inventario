# ==============================================================================
#  SISTEMA DE INVENTARIO TRANSACCIONAL — CONFIGURACIÓN LOCAL
#  Archivo: application.properties
#  Entorno: Desarrollo / Despliegue local (localhost)
# ==============================================================================


# ==============================================================================
#  1. CONFIGURACIÓN DE BASE DE DATOS (MySQL Workbench / MySQL 8.x)
# ==============================================================================

# URL de conexión a MySQL Workbench (localhost, puerto 3306).
# ► AJUSTAR: Cambia "inventario_db" si tu esquema tiene otro nombre.
# ► createDatabaseIfNotExist=true crea el esquema si no existe
#   (requiere que el usuario tenga permisos CREATE).
spring.datasource.url=jdbc:mariadb://localhost:3308/inventario_db?createDatabaseIfNotExist=true&characterEncoding=UTF-8&restrictedAuth=mysql_native_password,sha256_password,caching_sha2_password&allowPublicKeyRetrieval=true

# Usuario dedicado para la aplicación (no usar root).
spring.datasource.username=inventario_app

# ► AJUSTAR: Reemplaza con la contraseña de tu usuario de MySQL/MariaDB.
#   Si no tiene contraseña configurada, déjalo en blanco: spring.datasource.password=
spring.datasource.password=inventario123

# Driver MariaDB — compatible con MySQL 8.0.x (maneja caching_sha2_password y authentication_policy)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Pool de conexiones (HikariCP — integrado en Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=10000


# ==============================================================================
#  2. CONFIGURACIÓN JPA / HIBERNATE
# ==============================================================================

# "update" → Hibernate compara el esquema actual con las entidades y aplica
# los cambios necesarios (ALTER TABLE). Crea las tablas en el primer arranque.
# ► IMPORTANTE: En producción real cambiar a "validate" o "none".
spring.jpa.hibernate.ddl-auto=update

# Muestra las sentencias SQL generadas por Hibernate en la consola (útil en desarrollo).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto para MySQL 8.x (explícito para evitar NPE de Hibernate al detectar automáticamente).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Evita el error "No EntityManager with actual transaction available"
spring.jpa.open-in-view=false


# ==============================================================================
#  3. CONFIGURACIÓN DEL SERVIDOR WEB EMBEBIDO (Tomcat)
# ==============================================================================

# Puerto donde escucha la aplicación. Accede en: http://localhost:8080
# ► AJUSTAR: Cambia el número si el puerto 8080 ya está ocupado en tu máquina.
server.port=8080

# Nombre de la aplicación (usado en logs y actuator)
spring.application.name=sistema-inventario


# ==============================================================================
#  4. CONFIGURACIÓN DE THYMELEAF (Motor de Plantillas)
# ==============================================================================

# Deshabilitar caché en desarrollo para ver cambios sin reiniciar.
# ► Cambiar a "true" en producción para mejor rendimiento.
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML


# ==============================================================================
#  5. INTERNACIONALIZACIÓN (i18n)
# ==============================================================================

# Ruta de los archivos de mensajes: src/main/resources/i18n/messages_es.properties
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

# Locale por defecto al iniciar la aplicación (es = Español).
# El usuario puede cambiar el idioma en la navbar de la aplicación.
spring.messages.default-locale=es
spring.messages.use-code-as-default-message=false


# ==============================================================================
#  6. LOGGING
# ==============================================================================

# Nivel de log para el paquete raíz del proyecto.
logging.level.com.universidad.inventario=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
